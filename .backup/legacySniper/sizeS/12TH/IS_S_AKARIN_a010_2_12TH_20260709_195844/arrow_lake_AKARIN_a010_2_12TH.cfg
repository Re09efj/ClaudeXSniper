# Heterogeneous P/E core system - strategy=AKARIN_a010_2, threads=12
# Generated by ClaudeXSniper/config/generate_config.py
# Ordered CPUs: [4, 5, 3, 1, 12, 8, 10, 11, 13, 15, 14, 9]
#
# NUMA penalty: bus model (bandwidth-contention-based, no fixed hop latency)
# Cache sizes : L1-D=48KB  L2(P)=1280KB L2(E)=512KB  L3=12288KB

#include nehalem
#include gainestown

[general]
total_cores = 12
enable_icache_modeling = true

[perf_model/core]
type = interval
frequency = 2.9
frequency[] = 2.2,2.2,2.9,2.9,2.2,2.9,2.9,2.9,2.2,2.2,2.2,2.9

[perf_model/core/interval_timer]
dispatch_width = 5
dispatch_width[] = 3,3,5,5,3,5,5,5,3,3,3,5
window_size = 352
window_size[] = 256,256,352,352,256,352,352,352,256,256,256,352

[perf_model/l1_dcache]
cache_size = 48
cache_size[] = 32,32,48,48,32,48,48,48,32,32,32,48
address_hash = mod

[perf_model/l2_cache]
cache_size = 1280
cache_size[] = 512,512,1280,1280,512,1280,1280,1280,512,512,512,1280
associativity = 8
address_hash = mod

[perf_model/l3_cache]
cache_size = 12288
associativity = 16
shared_cores = 4
address_hash = mod

[perf_model/dram]
num_controllers = -1
controllers_interleaving = 4
latency = 60
per_controller_bandwidth = 51.2

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 102.4
ignore_local_traffic = true

[dvfs/simple]
cores_per_socket = 12

[power]
vdd = 1.0
technology_node = 10
