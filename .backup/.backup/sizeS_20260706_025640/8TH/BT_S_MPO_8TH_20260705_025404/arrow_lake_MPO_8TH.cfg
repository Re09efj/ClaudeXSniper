# Heterogeneous P/E core system - strategy=MPO, threads=8
# Generated by ClaudeXSniper/config/generate_config.py
# Ordered CPUs: [0, 1, 3, 2, 8, 10, 9, 11]
#
# NUMA penalty: bus model (bandwidth-contention-based, no fixed hop latency)
# Cache sizes : L1-D=16KB  L2(P)=512KB L2(E)=256KB  L3=4096KB

#include nehalem
#include gainestown

[general]
total_cores = 8
enable_icache_modeling = true

[perf_model/core]
type = interval
frequency = 4.0
frequency[] = 4.0,4.0,4.0,4.0,4.0,4.0,4.0,4.0

[perf_model/core/interval_timer]
dispatch_width = 4
dispatch_width[] = 4,4,4,4,4,4,4,4
window_size = 224
window_size[] = 224,224,224,224,224,224,224,224

[perf_model/l1_dcache]
cache_size = 16
cache_size[] = 16,16,16,16,16,16,16,16

[perf_model/l2_cache]
cache_size = 512
cache_size[] = 512,512,512,512,512,512,512,512
associativity = 8

[perf_model/l3_cache]
cache_size = 4096
associativity = 16
shared_cores = 4

[perf_model/dram]
num_controllers = -1
controllers_interleaving = 4
latency = 60
per_controller_bandwidth = 51.2

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 102.4
ignore_local_traffic = true

[dvfs/simple]
cores_per_socket = 8

[power]
vdd = 1.0
technology_node = 10
