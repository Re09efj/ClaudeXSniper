# Heterogeneous P/E core system - strategy=AKARIN_a055_11, threads=16
# Generated by ClaudeXSniper/config/generate_config.py
# Ordered CPUs: [0, 5, 2, 4, 7, 3, 1, 6, 12, 8, 13, 9, 11, 14, 10, 15]
#
# NUMA penalty: bus model (bandwidth-contention-based, no fixed hop latency)
# Cache sizes : L1-D=48KB  L2(P)=1280KB L2(E)=512KB  L3=12288KB

#include nehalem
#include gainestown

[general]
total_cores = 16
enable_icache_modeling = true

[perf_model/core]
type = interval
frequency = 2.9
frequency[] = 2.9,2.2,2.9,2.2,2.2,2.9,2.9,2.2,2.2,2.9,2.2,2.9,2.9,2.2,2.9,2.2

[perf_model/core/interval_timer]
dispatch_width = 5
dispatch_width[] = 5,3,5,3,3,5,5,3,3,5,3,5,5,3,5,3
window_size = 352
window_size[] = 352,256,352,256,256,352,352,256,256,352,256,352,352,256,352,256

[perf_model/l1_dcache]
cache_size = 48
cache_size[] = 48,32,48,32,32,48,48,32,32,48,32,48,48,32,48,32
address_hash = mod

[perf_model/l2_cache]
cache_size = 1280
cache_size[] = 1280,512,1280,512,512,1280,1280,512,512,1280,512,1280,1280,512,1280,512
associativity = 8
address_hash = mod

[perf_model/l3_cache]
cache_size = 12288
associativity = 16
shared_cores = 8
address_hash = mod

[perf_model/dram]
num_controllers = -1
controllers_interleaving = 8
latency = 60
per_controller_bandwidth = 51.2

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 102.4
ignore_local_traffic = true

[dvfs/simple]
cores_per_socket = 16

[power]
vdd = 1.0
technology_node = 10
